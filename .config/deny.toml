# cargo-deny configuration
# Used by .github/workflows/security.yml
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained  = "warn"
yanked        = "deny"
notice        = "warn"

[licenses]
# Allow only OSI-approved permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]
copyleft    = "warn"
unlicensed  = "deny"

[bans]
# Deny duplicate versions of the same crate (warn only — some are unavoidable)
multiple-versions = "warn"
# Never allow these crates
deny = [
    { name = "openssl", reason = "use rustls instead" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
